version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: magnus_postgres
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-magnus_db}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  redis:
    image: redis:7-alpine
    container_name: magnus_redis
    restart: always
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: magnus_backend
    restart: always
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql+asyncpg://${POSTGRES_USER:-postgres}:${POSTGRES_PASSWORD:-postgres}@postgres:5432/${POSTGRES_DB:-magnus_db}
      - SECRET_KEY=${SECRET_KEY:-super_secret_jwt_key_32_bytes_length}
    depends_on:
      - postgres
      - redis

volumes:
  postgres_data:
